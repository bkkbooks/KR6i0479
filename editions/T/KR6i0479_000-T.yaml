body:
  text: 佛說十力經大唐貞元新譯十地等經記新譯十地經及迴向輪經十力經等者即上都章敬寺沙門悟空本名法界因使罽賓於中天竺國之所得也師本京兆雲陽人也鄉號青龍里名嚮義俗姓車氏字曰奉朝後魏拓拔之胤裔也天假聰敏志尚典墳孝悌居家忠貞奉國遇玄宗至道大聖大明孝皇帝孝理天下萬國歡心八表稱臣四夷欽化時罽賓國願附聖唐使大首領薩波達幹與本國三藏舍利越魔天寶九載庚寅之歲來詣闕庭獻欵求和請使巡按次於明年辛卯之祀玄宗皇帝勅中使內侍省內寺伯賜緋魚袋張韜光將國信物行官奉傔四十餘人蒙恩授奉朝左衛涇州四門府別將員外置同正員令隨使臣取安西路次踈勒國次度葱山至楊興嶺及播蜜川五赤匿國亦云式匿次護蜜國次拘緯國次葛藍國次藍婆國次孽和國次烏仗那國亦云烏長及烏纏國茫誐平聲呼虐伽反勃國及高頭城次摩但國次信度城近信度河也亦云信圖或云辛頭城至十二載癸巳二月二十一日至乾陀羅國梵音正曰健䭾邏國此即罽賓東都城也王者冬居此地夏處罽賓隨其暄涼以順其性時王極垂禮接祇奉國恩使還對辭并得信物獻欵進奉旋歸大唐奉朝當為重患纏綿不堪勝致留寄健䭾邏國中使歸朝後漸痊平誓心歸佛遂投舍利越魔三藏落髮披緇願早還鄉對見明主侍覲父母忠孝兩全時蒙三藏賜與法號梵云達摩䭾都唐言以翻名為法界時年二十有七方得出家即當肅宗文明武德大聖大宣孝皇帝至德二載丁酉歲也洎二十九於迦溼彌羅國進受近圓請文殊矢涅地地移反平聲呼唐言翻為正智為鄔波𬽓耶唐言親教師安西云和上鄔不羼提唐言闕為羯磨阿遮利耶唐言軌範師若至四鎮安西云阿闍梨訛略耳䭾里魏巍屈反入聲呼地平聲同上唐言闕為教授阿遮利耶同上三師七證授以律儀於蒙鞮寺諷聲聞戒諷畢聽習根本律儀然於北天竺國皆薩婆多學也唐言根本說一切有然此蒙鞮寺者北天竺王踐位後建茲寺矣梵云蒙鞮微賀羅微賀羅者唐言住處住處即寺也次有阿彌陀婆挽免煩反平聲呼寺次有阿難儀寺次有繼者岑寺次有惱也羅寺次有惹惹而者反寺次有將軍寺次有也里特勒寺突厥王子置也次有可敦寺突厥皇后置也此國伽藍三百餘所靈塔瑞像其數頗多或阿育王及五百阿羅漢之所建立也如是巡禮兼習梵語經遊四年夙夜虔心未曾暫捨其國四周山為外郭總開三路以設關防東接吐蕃北通勃律西門一路通乾陀羅別有一途常時禁斷天軍行幸方得暫開法界至於第四年後出迦溼蜜國入乾陀羅城於如羅灑王寺中安置其寺王所建立從王為名王即上古罽膩吒王之胄胤也次有可忽哩寺王子名也繽芝寺王女名也復有旃檀忽哩寺王弟名也此皆隨人建立從彼受名次有特勤灑寺突厥王子造也可敦寺突厥皇后造也復有阿瑟吒寺薩緊忽哩寺罽膩吒王聖塔寺罽膩吒王演提灑寺此寺復有釋迦如來頂骨舍利有罽膩吒王伐龍宮沙彌寺如是巡禮又經二年即當代宗眷文孝武皇帝廣德二年甲辰歲也從此南遊中天竺國親禮八塔往迦毘羅伐窣覩城佛降生處塔次摩揭提國菩提道場成佛處塔於菩提寺夏坐安居次波羅痆斯城仙人鹿野苑中轉法輪處塔次鷲峯山說法華等經處塔次廣嚴城現不思議處塔次泥嚩多城從天降下三道寶階塔亦云寶橋次室羅伐城逝多林給孤獨園說摩訶般若波羅蜜多度諸外道處塔次拘尸那城娑羅雙林現入涅槃處塔如是八塔右遶供養瞻禮略周次於那爛陀寺中住經三載又至烏仗那國尋禮聖蹤住茫誐平聲呼虐迦反勃寺復有蘇訶拔提寺唐言日宮寺也鉢茫拔提寺唐言蓮華寺如是往來遍尋聖跡與大唐西域記說無少差殊思戀聖朝本生父母內外戚屬焚灼其心念鞠育恩深昊天罔極發願歸國瞻覲君親稽首諮詢越魔三藏三藏初聞至意不許法界以理懇請于再三三藏已於天寶九年曾至唐國日常讚慕摩訶支那既見懇誠方遂所請乃手授梵本十地經及迴向輪經并十力經共同一夾并大聖釋迦牟尼佛一牙舍利皆頂戴慇懃悲淚而授將為信物奉獻聖皇伏願漢地傳揚廣利群品法界頂跪拜受悲淚禮辭當欲汎海而歸又慮滄波險阻乃却取北路還歸帝鄉我聖神文武皇帝聖德遠被聲震五天道邁羲軒威加八表慕仰三寶信重一乘異域輸金重譯來貢法界所將舍利及梵本經自彼中天來至漢界凡所經歷覩貨羅國五十七蕃中有一城號骨咄國城東不遠有一小海其水極深當持牙經南岸而過時彼龍神知有舍利地土搖動玄雲揜興霹靂震雷雹雨驟墮有一大樹不遠海邊時與眾商投於樹下枝葉摧落空心火燃時首領商普告眾曰誰將舍利異寶殊珍不爾龍神何斯抝怒有即持出投入海中無令眾人受茲惶怖法界是時懇心祈願放達本國利濟邦家所獲福因用資龍力從日出後洎于申時祈祝至誠雲收雨霽僅全草命漸次前行至拘蜜支國王名頓散灑次惹瑟知國王名黑未梅次至式匿國如是行李經歷三年備涉艱難捐軀委命誓心報國願奉君親聖慈曲臨漸屆踈勒一名沙勒時王裴冷冷鎮守使魯陽留住五月次至于闐亦云于遁或云䛦丹梵云瞿薩怛那唐言地乳國王尉遲曜鎮守使鄭據延住六月次威戎城亦名鉢浣國正曰怖污國鎮守使蘇岑次據瑟得城使賈詮次至安西四鎮節度使開府儀同三司撿挍右散騎常侍安西副大都護兼御史大夫郭昕龜茲國王白環亦云丘茲正曰屈支城西門外有蓮花寺有三藏沙門名勿提提犀魚唐云蓮花精進至誠祈請譯出十力經可三紙許以成一卷三藏語通四鎮梵漢兼明此十力經佛在舍衛國說安西境內有前踐山前踐寺復有耶婆瑟鷄山此山有水滴霤成音每歲一時採以為曲故有耶婆瑟鷄寺東西拓厥寺阿遮哩貳寺於此城住一年有餘次至烏耆國王龍如林鎮守使楊日祐延留三月從此又發至北庭州本道節度使御史大夫楊襲古與龍興寺僧請于闐國三藏沙門尸羅達摩唐言戒法譯十地經三藏讀梵文并譯語沙門大震筆授沙門法超潤文沙門善信證義沙門法界證梵文并譯語迴向輪經翻譯准此翻經既畢繕寫欲終時逢聖朝四鎮北庭宜慰使中使段明秀來至北庭洎貞元五年己巳之歲九月十三日與本道奏事官節度押衙牛昕安西道奏事官程鍔等隨使入朝當為沙河不通取迴鶻路又為單于不信佛法所齎梵夾不敢持來留在北庭龍興寺藏所譯漢本隨使入都六年二月來到上京有勅令於躍龍門使院安置中使段明秀遂將釋迦真身一牙舍利及所譯經進奉入內天恩宣付左神策軍令寫此經本與佛牙舍利一時進來時左街功德使竇文場准勅裝寫進奉闕庭兼奏從安西來無名僧悟空年六十舊名法界俗姓車名奉朝請住章敬寺其年二月二十五日奉勅宣與正度餘依又本道節度奏事官以俗姓車奉朝名銜奏至五月十五日勅授壯武將軍守左金吾衛大將軍員外置同正員兼試太常卿爰有制日勅伊西庭節度奏事官節度押衙同節度副使雲麾將軍守左金吾衛大將軍員外置同正員牛昕等並越自流沙涉于陰國奉三軍向化之慕申萬里戀闕之誠雨雪載霏行邁無已方貢善達復命言旋舉范羗入計之勞慰班超出遠之思俾昇崇祑以勸使臣可依前件是歲也天恩正名冠冕兼履昔名法界今字悟空捧戴慚惶不任感懼乃歸章敬次及鄉園訪問二親墳樹已拱兄弟子姪家無一人踈遠諸房少得聞見凡所來往經四十年辛卯西征于今庚午悲不奉養喜遇明時所進牙經願資聖壽其所進十地經依常途寫一百二十一紙成部勒為九卷此經佛初成正覺已經二七日住他化自在天宮摩尼寶藏殿說迴向輪經佛在金剛摩尼寶山峯中與大菩薩說譯成三紙半以為一卷其十力經如前所說譯成三紙復為一卷三部都計一百二十九紙總十一卷同為一帙然為斯經未入目錄伏恐年月深遠人疑偽經今請編入大唐貞元續開元釋教錄伏以一辭聖唐于今四代凌霜冒雪經四十年尋禮聖蹤所經國邑或一瞻禮或漸旬時或經累旬或盈數月或住一歲二三四年或遇吉祥或遭劫賊安樂時少憂惱處多不能宣心一一屢說幸逢明聖略舉大網伏乞施行流傳永代沙門圓照自惟疵賤素無藝能喜遇明時再登翻譯續修圖紀讚述真乘并修大唐貞元續開元釋教錄悟空大德具述行由託余記之以附圖錄聊以驗其事也久積歲年詰問根源恭承口訣詞踈意拙編其次云大雅碩才願詳其志也
